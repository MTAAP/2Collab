services:
  collab-server:
    build:
      context: .
      target: runtime
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3210
      DATA_DIR: /data
      BACKUP_DIR: /backups
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:?WEBAUTHN_RP_ID is required}
      DEPLOYMENT_MASTER_KEY_FILE: /run/secrets/deployment_master_key
      BOOTSTRAP_SECRET_FILE: /run/secrets/bootstrap_secret
    secrets:
      - source: deployment_master_key
        target: deployment_master_key
        uid: "1000"
        gid: "1000"
        mode: 0o600
      - source: bootstrap_secret
        target: bootstrap_secret
        uid: "1000"
        gid: "1000"
        mode: 0o600
    ports:
      - "127.0.0.1:3210:3210"
    volumes:
      - collab-data:/data
      - collab-backups:/backups
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

secrets:
  deployment_master_key:
    file: ${DEPLOYMENT_MASTER_KEY_FILE:?DEPLOYMENT_MASTER_KEY_FILE is required}
  bootstrap_secret:
    file: ${BOOTSTRAP_SECRET_FILE:?BOOTSTRAP_SECRET_FILE is required}

volumes:
  collab-data:
  collab-backups:

