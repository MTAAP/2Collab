services:
  collab-server:
    build:
      context: .
      target: runtime
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3210
      DATA_DIR: /data
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set to at least 32 random characters}
    ports:
      - "${COLLAB_BIND_HOST:-127.0.0.1}:${COLLAB_PORT:-3210}:3210"
    volumes:
      - collab-data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  collab-data:

