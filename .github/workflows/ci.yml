name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify source and browser behavior
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Install locked dependencies
        run: bun ci

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit and integration tests
        run: bun run test

      - name: Build all artifacts
        run: bun run build

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run browser smoke test against the built server
        run: bun run test:e2e:run

      - name: Audit public repository hygiene
        run: bun run audit:public

      - name: Verify release checksums
        run: bun run manifest:verify

      - name: Verify deterministic source archive
        run: bun run archive:verify

  container:
    name: Build and smoke-test container
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build image
        run: docker build --pull --tag 2collab:ci .

      - name: Verify health contract
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker run --detach --rm \
            --env SESSION_SECRET=ci-only-health-secret-000000000000000000000000 \
            --publish 127.0.0.1:3210:3210 \
            2collab:ci)"
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if response="$(curl --fail --silent --show-error http://127.0.0.1:3210/healthz 2>/dev/null)"; then
              python3 -c 'import json,sys; actual=json.loads(sys.argv[1]); expected={"apiVersion":"v1","service":"2collab","status":"OK","version":"0.1.0"}; assert actual == expected, (actual, expected)' "$response"
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1
